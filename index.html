<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practical Notes</title>
    <meta
      name="description"
      content="A modern practical notes website with search, previews, downloads, and a polished responsive UI."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="loader-overlay" id="loaderOverlay">
      <div class="loader-card">
        <div class="spinner"></div>
        <p>Loading practical notes...</p>
      </div>
    </div>

    <div class="background-orb orb-1"></div>
    <div class="background-orb orb-2"></div>

    <header class="topbar">
      <a href="#" class="brand">
        <span class="brand-icon">📘</span>
        <span>Practical Notes</span>
      </a>
      <nav class="nav-links">
        <a href="#home">Home</a>
        <a href="#practicals">Practicals</a>
        <a href="#about">About</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          🌙
        </button>
      </nav>
    </header>

    <main id="home">
      <section class="hero">
        
        <div class="hero-card" aria-label="Announcement">
          <marquee behavior="scroll" direction="left" scrollamount="6">
            BETA DHAYAN SE COPY KR
          </marquee>
        </div>
      </section>

      <section class="controls-section" id="practicals">
        <div class="search-box">
          <input
            type="search"
            id="searchInput"
            placeholder="Search practicals by number or title..."
            aria-label="Search practicals"
          />
          <span class="search-icon">🔎</span>
        </div>
        <div id="practicalsGrid" class="practicals-grid" aria-live="polite"></div>
      </section>
    </main>

    <section class="about-section" id="about">
      <div class="about-card">
        <h2>Built for quick study</h2>
        <p>
          This website delivers a polished learning experience with fast search, modal previews,
          and instant downloads for every practical note.
        </p>
      </div>
    </section>

    <div class="modal" id="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalClose" aria-label="Close preview">×</button>
        <div class="modal-body" id="modalBody">
          <div class="modal-loader" id="modalLoader">
            <div class="spinner"></div>
            <p>Loading content...</p>
          </div>
        </div>
      </div>
    </div>

    <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">↑</button>

    <script src="script.js"></script>
  </body>
</html>
